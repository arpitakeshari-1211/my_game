<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja Cloud Jumper</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none;
        }
        
        #portrait-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; color: white; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        @media (max-width: 899px) and (orientation: portrait) {
            #portrait-warning { display: flex; }
            #game-wrapper { display: none !important; }
        }

        #game-wrapper {
            position: relative; width: 100%; max-width: 800px; height: 100%; max-height: 400px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px; box-shadow: 0 0 40px rgba(0, 150, 255, 0.4);
        }
        
        canvas {
            background: linear-gradient(to bottom, #1e3a8a, #38bdf8);
            border-radius: 12px; width: 100%; height: 100%; touch-action: none; 
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(15, 23, 42, 0.85); border-radius: 12px; z-index: 50;
            text-align: center; color: white;
        }
        .hidden { display: none !important; }
        
        h1 { margin: 0 0 10px 0; font-size: 36px; text-shadow: 0 4px 6px rgba(0,0,0,0.5); color: #facc15; }
        h2 { margin: 0 0 20px 0; font-size: 28px; }
        p { margin-bottom: 25px; font-size: 18px; color: #cbd5e1; }

        .btn-menu {
            background: linear-gradient(to bottom, #3b82f6, #2563eb); border: 2px solid #60a5fa;
            color: white; font-size: 18px; font-weight: bold; padding: 12px 30px; margin: 10px;
            border-radius: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, filter 0.1s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-menu:active { transform: scale(0.95); filter: brightness(1.2); }
        .btn-green { background: linear-gradient(to bottom, #22c55e, #16a34a); border-color: #4ade80; }
        .btn-red { background: linear-gradient(to bottom, #ef4444, #dc2626); border-color: #f87171; }
        
        .level-grid { display: flex; gap: 15px; margin-bottom: 20px; }
        .level-btn {
            background: #1e293b; border: 3px solid #facc15; color: #facc15;
            font-size: 24px; font-weight: bold; width: 70px; height: 70px;
            border-radius: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }
        .level-btn:active { background: #facc15; color: #1e293b; }
        
        /* Locked Level Styling */
        .level-btn.locked {
            background: #334155; border: 3px solid #64748b; color: #94a3b8;
            cursor: not-allowed; filter: grayscale(100%);
        }
        .level-btn.locked:active { background: #334155; color: #94a3b8; transform: none; }

        #mobileControls {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; 
            pointer-events: none; z-index: 10;
        }
        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .btn-pad {
            background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255,255,255,0.4);
            color: white; font-size: 24px; width: 60px; height: 60px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; touch-action: none; pointer-events: auto;
        }
        .btn-pad:active { background: rgba(255, 255, 255, 0.4); }
        .btn-jump { background: rgba(34, 197, 94, 0.3); border-color: #4ade80; width: 70px; height: 70px; }
        @media (min-width: 900px) { #mobileControls { display: none; } }
        
        #inGameMenu { position: absolute; top: 10px; right: 10px; pointer-events: auto; z-index: 10; }
        .btn-small {
            background: rgba(0,0,0,0.5); border: 1px solid white; color: white;
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px; margin-left: 5px;
        }
    </style>
</head>
<body>

    <div id="portrait-warning">
        <h2>📱 Please Rotate Your Phone</h2>
        <p>This game is played in Landscape Mode.</p>
    </div>

    <div id="game-wrapper">
        <div id="inGameMenu" class="hidden">
            <button class="btn-small" id="btnPauseMenu">⏸️ Menu</button>
        </div>

        <div id="ui-layer">
            <div id="screen-main" class="ui-screen">
                <h1>NINJA CLOUD JUMPER</h1>
                <p>Arpita's Quest to the Mountain Dojo</p>
                <button class="btn-menu btn-green" id="btnStartGame">▶ Play Game</button>
                <button class="btn-menu" id="btnSelectLevel">View Levels</button>
                <button class="btn-menu btn-red" id="btnWipeSave" style="font-size: 12px; padding: 8px 15px; margin-top: 20px;">Wipe Progress</button>
            </div>

            <div id="screen-levels" class="ui-screen hidden">
                <h2>Select a Level</h2>
                <div class="level-grid" id="levelGrid">
                    <button class="level-btn" data-level="0">1</button>
                    <button class="level-btn" data-level="1">2</button>
                    <button class="level-btn" data-level="2">3</button>
                </div>
                <button class="btn-menu btn-red" id="btnBackToMain">Back</button>
            </div>

            <div id="screen-gameover" class="ui-screen hidden">
                <h1 style="color: #ef4444;">OUT OF LIVES!</h1>
                <p id="gameOverText">The Ninja fell.</p>
                <button class="btn-menu btn-green" id="btnRetry">↺ Retry Level</button>
                <button class="btn-menu btn-red" id="btnQuit1">Main Menu</button>
            </div>

            <div id="screen-won" class="ui-screen hidden">
                <h1 style="color: #4ade80;">LEVEL CLEAR!</h1>
                <p>You reached the Dojo!</p>
                <button class="btn-menu btn-green" id="btnNextLevel">Next Level ➔</button>
                <button class="btn-menu" id="btnQuit2">Main Menu</button>
            </div>

            <div id="screen-beaten" class="ui-screen hidden">
                <h1>ARPITA IS AWESOME!</h1>
                <p>You completed all the levels. You are a true Ninja!</p>
                <button class="btn-menu btn-green" id="btnPlayAgain">Play Again</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="mobileControls" class="hidden">
            <div class="control-group">
                <div class="btn-pad" id="btnLeft">⬅️</div>
                <div class="btn-pad" id="btnRight">➡️</div>
            </div>
            <div class="btn-pad btn-jump" id="btnJump">⬆️</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const uiLayer = document.getElementById("ui-layer");
        const inGameMenu = document.getElementById("inGameMenu");
        const mobileControls = document.getElementById("mobileControls");
        const screens = document.querySelectorAll(".ui-screen");
        
        // Progress Variables
        let highScore = parseInt(localStorage.getItem("ninjaHighScore")) || 0; 
        let score = 0;
        let currentLevel = parseInt(localStorage.getItem("ninjaLevel")) || 0;
        let lives = 5; 
        
        // NEW: UNLOCKED LEVELS TRACKER
        let unlockedLevel = parseInt(localStorage.getItem("ninjaUnlockedLevel")) || 0;

        function updateLevelSelectUI() {
            document.querySelectorAll(".level-btn").forEach(btn => {
                let lvl = parseInt(btn.getAttribute("data-level"));
                if (lvl > unlockedLevel) {
                    btn.classList.add("locked");
                    btn.innerText = "🔒";
                } else {
                    btn.classList.remove("locked");
                    btn.innerText = lvl + 1;
                }
            });
        }

        function saveProgress() {
            localStorage.setItem("ninjaLevel", currentLevel);
            localStorage.setItem("ninjaUnlockedLevel", unlockedLevel);
        }

        function showScreen(screenId) {
            screens.forEach(s => s.classList.add("hidden"));
            uiLayer.classList.remove("hidden");
            inGameMenu.classList.add("hidden");
            mobileControls.classList.add("hidden");
            if (screenId) document.getElementById(screenId).classList.remove("hidden");
            if (screenId === 'screen-levels') updateLevelSelectUI();
        }

        function startGameUI() {
            uiLayer.classList.add("hidden");
            inGameMenu.classList.remove("hidden");
            mobileControls.classList.remove("hidden");
            initAudio();
            attemptFullscreen();
        }

        // Audio Engine
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playRetroSound(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination); const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'coin') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(987.77, now); osc.frequency.setValueAtTime(1318.51, now + 0.1); 
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'stomp') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.15); 
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'die') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.5); 
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'win') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.1);
                osc.frequency.setValueAtTime(659.25, now + 0.2); osc.frequency.setValueAtTime(880, now + 0.3); 
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }
        function playCustomSpeech(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.volume = 0.8; utterance.rate = 1.3; window.speechSynthesis.speak(utterance);
        }

        let gameState = "START"; 
        let cameraX = 0; let walkTimer = 0; let frameCount = 0;
        let player, clouds, coins, enemies, projectiles, particles, mountain;

        const levelData = [
            { // LEVEL 1
                goal: { x: 2500, y: 200, w: 250, h: 200 },
                clouds: [
                    { x: 50, y: 300, w: 200, h: 20, type: "solid" }, 
                    { x: 350, y: 250, w: 180, h: 20, type: "solid" },
                    { x: 650, y: 200, w: 150, h: 20, type: "moving", speed: 2, minX: 550, maxX: 750 },
                    { x: 950, y: 150, w: 180, h: 20, type: "solid" },
                    { x: 1350, y: 200, w: 180, h: 20, type: "solid" },
                    { x: 1700, y: 250, w: 180, h: 20, type: "solid" },
                    { x: 2050, y: 200, w: 150, h: 20, type: "moving", speed: 3, minX: 1950, maxX: 2200 }
                ],
                coins: [{x: 420, y: 200}, {x: 1050, y: 100}, {x: 1780, y: 180}],
                enemies: []
            },
            { // LEVEL 2
                goal: { x: 3000, y: 200, w: 250, h: 200 },
                clouds: [
                    { x: 50, y: 300, w: 180, h: 20, type: "solid" },
                    { x: 300, y: 250, w: 140, h: 20, type: "crumble", timer: 40 }, 
                    { x: 550, y: 200, w: 140, h: 20, type: "crumble", timer: 40 },
                    { x: 800, y: 150, w: 180, h: 20, type: "solid" },
                    { x: 1200, y: 200, w: 150, h: 20, type: "moving", speed: 2, minX: 1100, maxX: 1350 },
                    { x: 1650, y: 150, w: 140, h: 20, type: "crumble", timer: 50 },
                    { x: 2000, y: 250, w: 200, h: 20, type: "solid" },
                    { x: 2450, y: 200, w: 140, h: 20, type: "crumble", timer: 30 },
                    { x: 2750, y: 180, w: 140, h: 20, type: "solid" }
                ],
                coins: [{x: 850, y: 100}, {x: 1250, y: 100}, {x: 2100, y: 200}],
                enemies: [
                    { x: 850, y: 130, w: 20, h: 10, type: "patrol", speed: 3, minX: 800, maxX: 950 },
                    { x: 2100, y: 230, w: 20, h: 10, type: "patrol", speed: 4, minX: 2000, maxX: 2150 }
                ]
            },
            { // LEVEL 3
                goal: { x: 3200, y: 200, w: 250, h: 200 },
                clouds: [
                    { x: 50, y: 300, w: 180, h: 20, type: "solid" },
                    { x: 350, y: 250, w: 160, h: 20, type: "moving", speed: 3, minX: 250, maxX: 450 },
                    { x: 700, y: 200, w: 150, h: 20, type: "solid" },
                    { x: 1050, y: 150, w: 140, h: 20, type: "crumble", timer: 40 },
                    { x: 1400, y: 200, w: 180, h: 20, type: "solid" }, 
                    { x: 1850, y: 250, w: 140, h: 20, type: "crumble", timer: 30 },
                    { x: 2200, y: 200, w: 180, h: 20, type: "solid" }, 
                    { x: 2650, y: 150, w: 180, h: 20, type: "moving", speed: 4, minX: 2500, maxX: 2800 }
                ],
                coins: [{x: 750, y: 150}, {x: 1450, y: 100}, {x: 2700, y: 80}],
                enemies: [
                    { x: 1450, y: 160, w: 20, h: 40, type: "shooter", cooldown: 200, timer: 0 },
                    { x: 2250, y: 160, w: 20, h: 40, type: "shooter", cooldown: 180, timer: 0 }
                ]
            }
        ];

        const bgMountains = [ 
            { x: 0, y: 200, w: 400, h: 250 }, { x: 500, y: 150, w: 500, h: 300 },
            { x: 1100, y: 220, w: 450, h: 200 }, { x: 1800, y: 120, w: 600, h: 350 },
            { x: 2600, y: 180, w: 500, h: 250 }, { x: 3300, y: 150, w: 400, h: 300 }
        ];

        // Controls
        const keys = { right: false, left: false };
        window.addEventListener("keydown", (e) => {
            if (e.code === "ArrowRight") keys.right = true;
            if (e.code === "ArrowLeft") keys.left = true;
            if (e.code === "ArrowUp" || e.code === "Space") handleJump();
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowRight") keys.right = false;
            if (e.code === "ArrowLeft") keys.left = false;
        });

        // Touch Gamepad
        document.getElementById("btnLeft").addEventListener("touchstart", (e) => { e.preventDefault(); keys.left = true; });
        document.getElementById("btnLeft").addEventListener("touchend", (e) => { e.preventDefault(); keys.left = false; });
        document.getElementById("btnRight").addEventListener("touchstart", (e) => { e.preventDefault(); keys.right = true; });
        document.getElementById("btnRight").addEventListener("touchend", (e) => { e.preventDefault(); keys.right = false; });
        document.getElementById("btnJump").addEventListener("touchstart", (e) => { e.preventDefault(); handleJump(); });

        function handleJump() {
            if (gameState === "PLAYING" && player.jumps < player.maxJumps) {
                player.dy = player.jumpPower; player.grounded = false; player.jumps++;
                playRetroSound('jump');
                createParticles(player.x + 10, player.y + 40, "white", 10);
            }
        }

        async function attemptFullscreen() {
            if (document.documentElement.requestFullscreen) {
                try {
                    await document.documentElement.requestFullscreen();
                    screen.orientation.lock("landscape").catch(e=>{}); 
                } catch(e){}
            }
        }

        // --- UI BUTTON LISTENERS ---
        document.getElementById("btnStartGame").onclick = () => { 
            if(currentLevel > unlockedLevel) currentLevel = unlockedLevel; // Failsafe
            loadLevel(currentLevel); 
        };
        document.getElementById("btnSelectLevel").onclick = () => { showScreen('screen-levels'); };
        document.getElementById("btnBackToMain").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnRetry").onclick = () => { lives = 5; score = 0; loadLevel(currentLevel); };
        document.getElementById("btnNextLevel").onclick = () => { loadLevel(currentLevel); };
        document.getElementById("btnPlayAgain").onclick = () => { currentLevel=0; lives=5; score=0; loadLevel(0); };
        document.getElementById("btnQuit1").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnQuit2").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnPauseMenu").onclick = () => { gameState = "START"; showScreen('screen-main'); };

        // Wipe Progress Button
        document.getElementById("btnWipeSave").onclick = () => {
            if(confirm("Are you sure you want to delete your progress? This will lock all levels again!")) {
                localStorage.removeItem("ninjaLevel");
                localStorage.removeItem("ninjaUnlockedLevel");
                localStorage.removeItem("ninjaHighScore");
                currentLevel = 0; unlockedLevel = 0; highScore = 0; score = 0;
                alert("Progress Wiped!");
                updateLevelSelectUI();
            }
        };

        // Level Select Buttons (WITH LOCK LOGIC)
        document.querySelectorAll(".level-btn").forEach(btn => {
            btn.onclick = (e) => {
                let lvl = parseInt(e.target.getAttribute("data-level"));
                if (lvl > unlockedLevel) {
                    // Play an error sound or shake effect if clicked on locked level
                    e.target.style.transform = "translate(5px, 0)";
                    setTimeout(() => e.target.style.transform = "none", 100);
                    return; 
                }
                currentLevel = lvl;
                lives = 5; score = 0; saveProgress();
                loadLevel(currentLevel);
            };
        });

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 1.0, color: color });
            }
        }

        function loadLevel(index) {
            let data = levelData[index];
            player = { x: 50, y: 200, width: 20, height: 40, dx: 0, dy: 0, speed: 5, jumpPower: -10, gravity: 0.5, grounded: false, jumps: 0, maxJumps: 2 };
            cameraX = 0; frameCount = 0; particles = []; projectiles = [];
            mountain = { ...data.goal };
            clouds = JSON.parse(JSON.stringify(data.clouds));
            clouds.forEach(c => { if(c.type === "crumble") c.steppedOn = false; });
            coins = JSON.parse(JSON.stringify(data.coins)).map(c => ({...c, r: 10, collected: false}));
            enemies = JSON.parse(JSON.stringify(data.enemies));
            gameState = "PLAYING";
            startGameUI();
        }

        function die() {
            lives--; playRetroSound('die'); 
            if (lives > 0) {
                loadLevel(currentLevel); 
            } else {
                gameState = "GAMEOVER"; 
                document.getElementById("gameOverText").innerText = `Failed at Level ${currentLevel + 1}`;
                showScreen('screen-gameover');
            }
        }

        function update() {
            if (gameState !== "PLAYING") return;
            frameCount++;

            if (keys.right) { player.x += player.speed; walkTimer++; }
            if (keys.left) { player.x -= player.speed; walkTimer++; }
            player.dy += player.gravity; player.y += player.dy;

            if (player.y > canvas.height + 150) die(); 

            player.grounded = false;
            for (let i = clouds.length - 1; i >= 0; i--) {
                let c = clouds[i];
                if (c.type === "moving") {
                    c.x += c.speed;
                    if (c.x > c.maxX || c.x < c.minX) c.speed *= -1;
                }
                if (c.type === "crumble" && c.steppedOn) {
                    c.timer--;
                    if (c.timer <= 0) {
                        createParticles(c.x + c.w/2, c.y, "gray", 20);
                        clouds.splice(i, 1); continue;
                    }
                }

                if (player.dy >= 0 && player.x < c.x + c.w && player.x + player.width > c.x &&
                    player.y + player.height >= c.y && player.y + player.height <= c.y + c.h + player.dy) {
                        player.grounded = true; player.jumps = 0; player.dy = 0;
                        player.y = c.y - player.height;
                        if (c.type === "moving") player.x += c.speed; 
                        if (c.type === "crumble") c.steppedOn = true; 
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.type === "patrol") {
                    e.x += e.speed;
                    if (e.x > e.maxX || e.x < e.minX) e.speed *= -1;
                } else if (e.type === "shooter") {
                    e.timer++;
                    if (e.timer >= e.cooldown) { 
                        e.timer = 0; projectiles.push({ x: e.x, y: e.y + 10, vx: -2.5, w: 10, h: 10 });
                    }
                }

                if (player.x < e.x + e.w && player.x + player.width > e.x && player.y < e.y + e.h && player.y + player.height > e.y) {
                    if (player.dy > 0 && player.y + player.height < e.y + 15) {
                        enemies.splice(i, 1); player.dy = -8; score += 100; 
                        playRetroSound('stomp'); createParticles(e.x + e.w/2, e.y, "red", 30); 
                    } else {
                        die();
                    }
                }
            }

            for (let p of projectiles) {
                p.x += p.vx;
                if (player.x < p.x + p.w && player.x + player.width > p.x && player.y < p.y + p.h && player.y + player.height > p.y) die();
            }

            for (let coin of coins) {
                if (!coin.collected && player.x < coin.x + coin.r && player.x + player.width > coin.x - coin.r &&
                    player.y < coin.y + coin.r && player.y + player.height > coin.y - coin.r) {
                        coin.collected = true; score += 50; playRetroSound('coin'); 
                        if (score > highScore) { highScore = score; localStorage.setItem("ninjaHighScore", highScore); }
                        createParticles(coin.x, coin.y, "gold", 20);
                }
            }

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
            particles = particles.filter(p => p.life > 0);

            // Level Complete Trigger
            if (player.x + player.width > mountain.x && player.y + player.height > mountain.y) {
                gameState = "LEVEL_WON"; playRetroSound('win'); 
                
                // UNLOCK NEXT LEVEL LOGIC
                if (currentLevel >= unlockedLevel && currentLevel < levelData.length - 1) {
                    unlockedLevel = currentLevel + 1;
                }
                currentLevel++; 
                saveProgress();
                
                if (currentLevel >= levelData.length) {
                    gameState = "GAME_BEATEN"; currentLevel = 0; saveProgress();
                    playCustomSpeech("hurrayyyy, Arpita! you beat the whole game! you are awesome!");
                    showScreen('screen-beaten');
                } else {
                    showScreen('screen-won');
                }
            }

            cameraX = player.x - 250; 
        }

        // --- DRAWING FUNCTIONS ---

        function drawPuffyCloud(ctx, x, y, w, h, baseColor, isCrumbling, steppedOn) {
            ctx.fillStyle = isCrumbling && steppedOn ? "#fca5a5" : baseColor;
            let shake = isCrumbling && steppedOn ? (Math.random() - 0.5) * 4 : 0;
            x += shake;
            
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, h/2); 
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x + w*0.2, y + 5, h*0.7, 0, Math.PI*2);
            ctx.arc(x + w*0.5, y + 2, h*0.9, 0, Math.PI*2);
            ctx.arc(x + w*0.8, y + 5, h*0.7, 0, Math.PI*2);
            ctx.fill();
        }

        // NEW: JAPANESE PAGODA TEMPLE
        function drawMountainHome(ctx, mX, mY, mW, mH) {
            // Main Mountain Base
            ctx.fillStyle = "#334155"; 
            ctx.beginPath();
            ctx.moveTo(mX, mY + mH); ctx.lineTo(mX + mW / 2, mY); ctx.lineTo(mX + mW, mY + mH); ctx.fill();
            
            // Snow Cap
            ctx.fillStyle = "white"; ctx.beginPath();
            ctx.moveTo(mX + mW*0.25, mY + mH*0.5); ctx.lineTo(mX + mW / 2, mY); ctx.lineTo(mX + mW*0.75, mY + mH*0.5);
            ctx.lineTo(mX + mW*0.6, mY + mH*0.4); ctx.lineTo(mX + mW*0.5, mY + mH*0.55); ctx.lineTo(mX + mW*0.4, mY + mH*0.4);
            ctx.fill();

            let dX = mX + mW/2; 
            let dY = mY - 10;   
            
            // Foundation
            ctx.fillStyle = "#475569"; ctx.fillRect(dX - 50, dY - 10, 100, 10);
            
            // First Floor Building
            ctx.fillStyle = "#78350f"; ctx.fillRect(dX - 40, dY - 40, 80, 30);
            ctx.fillStyle = "#fef3c7"; ctx.fillRect(dX - 15, dY - 30, 30, 20); // Shoji screen door
            ctx.fillStyle = "#000"; ctx.fillRect(dX - 1, dY - 30, 2, 20); 
            ctx.fillRect(dX - 15, dY - 20, 30, 2); 
            
            // First Roof (Wide, curved)
            ctx.fillStyle = "#991b1b"; ctx.beginPath();
            ctx.moveTo(dX - 60, dY - 40); 
            ctx.quadraticCurveTo(dX - 40, dY - 55, dX, dY - 55);
            ctx.quadraticCurveTo(dX + 40, dY - 55, dX + 60, dY - 40);
            ctx.lineTo(dX + 50, dY - 40); ctx.lineTo(dX + 40, dY - 50); ctx.lineTo(dX - 40, dY - 50); ctx.lineTo(dX - 50, dY - 40);
            ctx.fill();

            // Second Floor Building
            ctx.fillStyle = "#78350f"; ctx.fillRect(dX - 30, dY - 75, 60, 25);
            ctx.fillStyle = "#fef3c7"; ctx.fillRect(dX - 10, dY - 70, 20, 15);
            ctx.fillStyle = "#000"; ctx.fillRect(dX - 1, dY - 70, 2, 15);
            
            // Second Roof (Top roof)
            ctx.fillStyle = "#991b1b"; ctx.beginPath();
            ctx.moveTo(dX - 50, dY - 75);
            ctx.quadraticCurveTo(dX - 25, dY - 100, dX, dY - 100);
            ctx.quadraticCurveTo(dX + 25, dY - 100, dX + 50, dY - 75);
            ctx.lineTo(dX + 40, dY - 75); ctx.lineTo(dX + 30, dY - 85); ctx.lineTo(dX - 30, dY - 85); ctx.lineTo(dX - 40, dY - 75);
            ctx.fill();

            // Golden Spire on top
            ctx.fillStyle = "#facc15"; 
            ctx.fillRect(dX - 2, dY - 115, 4, 15);
            ctx.beginPath(); ctx.arc(dX, dY - 115, 4, 0, Math.PI*2); ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState !== "PLAYING") return; 

            ctx.save();
            
            ctx.fillStyle = "#1e293b"; 
            for (let bg of bgMountains) {
                ctx.beginPath();
                ctx.moveTo(bg.x - (cameraX * 0.15), bg.y + bg.h);
                ctx.lineTo(bg.x + (bg.w/2) - (cameraX * 0.15), bg.y);
                ctx.lineTo(bg.x + bg.w - (cameraX * 0.15), bg.y + bg.h);
                ctx.fill();
            }

            ctx.translate(-cameraX, 0); 

            // Draw Mountain & New Temple
            drawMountainHome(ctx, mountain.x, mountain.y, mountain.w, mountain.h);

            for (let c of clouds) {
                let color = c.type === "moving" ? "#7dd3fc" : (c.type === "crumble" ? "#cbd5e1" : "white");
                drawPuffyCloud(ctx, c.x, c.y, c.w, c.h, color, c.type === "crumble", c.steppedOn);
            }

            for (let coin of coins) {
                if (!coin.collected) {
                    ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#ca8a04"; ctx.beginPath(); ctx.arc(coin.x, coin.y, coin.r - 3, 0, Math.PI * 2); ctx.fill();
                }
            }

            for (let e of enemies) {
                if (e.type === "patrol") { 
                    ctx.fillStyle = "black"; ctx.beginPath(); ctx.moveTo(e.x, e.y);
                    ctx.lineTo(e.x + 10, e.y + (frameCount % 10 < 5 ? 10 : -5));
                    ctx.lineTo(e.x + 20, e.y); ctx.stroke();
                    ctx.lineWidth = 3; ctx.strokeStyle = "black"; ctx.stroke();
                } else if (e.type === "shooter") { 
                    ctx.fillStyle = "#991b1b"; ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.fillStyle = "#fed7aa"; ctx.fillRect(e.x - 2, e.y + 5, 10, 6); 
                }
            }

            ctx.fillStyle = "silver";
            for (let p of projectiles) {
                ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2);
                ctx.rotate(frameCount * 0.5); ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
            }

            for (let p of particles) {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0; 

            ctx.fillStyle = "#0f172a"; ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = "#fed7aa"; ctx.fillRect(player.x + (keys.left ? 0 : 5), player.y + 5, 15, 8); 
            ctx.fillStyle = "#ef4444"; ctx.fillRect(player.x - 10, player.y + 5, 10, 3);
            
            let legOffset = (walkTimer % 10 < 5 && player.grounded && (keys.left || keys.right)) ? 5 : 0;
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(player.x + 2 - legOffset, player.y + 40, 6, 10); 
            ctx.fillRect(player.x + 12 + legOffset, player.y + 40, 6, 10); 

            ctx.restore(); 

            let uiScale = canvas.width / 800; 
            ctx.fillStyle = "white"; ctx.font = `bold ${20 * uiScale}px 'Segoe UI'`;
            ctx.fillText("Score: " + score, 15 * uiScale, 30 * uiScale);
            ctx.fillStyle = "#facc15"; ctx.fillText("High Score: " + highScore, 15 * uiScale, 60 * uiScale);
            ctx.fillStyle = "#ef4444"; ctx.font = `${22 * uiScale}px Arial`;
            ctx.fillText("Lives: " + "❤️".repeat(lives), 15 * uiScale, 90 * uiScale); 
            ctx.fillStyle = "white"; ctx.font = `bold ${20 * uiScale}px 'Segoe UI'`;
            ctx.fillText("Level: " + (currentLevel + 1), canvas.width / 2 - 40, 30 * uiScale);
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        
        updateLevelSelectUI(); // Check locks on load
        showScreen('screen-main');
        loop(); 
    </script>
</body>
