<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja Cloud Jumper</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0c1120; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0c1120; color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 899px) and (orientation: portrait) { #portrait-warning { display: flex; } #game-wrapper { display: none !important; } }

        #game-wrapper { position: relative; width: 100%; max-width: 800px; height: 100%; max-height: 400px; border-radius: 12px; box-shadow: 0 0 50px rgba(100, 200, 255, 0.4); }
        
        canvas { background: linear-gradient(to bottom, #0c1120 0%, #1e3a8a 50%, #38bdf8 100%); border-radius: 12px; width: 100%; height: 100%; touch-action: none; }

        /* Modern UI */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(10, 15, 30, 0.9); border-radius: 12px; z-index: 50; text-align: center; color: white; }
        .hidden { display: none !important; }
        
        h1 { margin: 0 0 10px 0; font-size: 38px; color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
        h2 { margin: 0 0 20px 0; font-size: 28px; }
        p { margin-bottom: 30px; font-size: 18px; color: #cbd5e1; }

        .btn-menu { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); border: 2px solid #60a5fa; color: white; font-size: 18px; font-weight: bold; padding: 12px 35px; margin: 10px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.1s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-menu:active { transform: scale(0.95); filter: brightness(1.2); }
        .btn-green { background: linear-gradient(to bottom, #22c55e, #15803d); border-color: #4ade80; }
        .btn-red { background: linear-gradient(to bottom, #ef4444, #b91c1c); border-color: #f87171; }
        
        .level-grid { display: flex; gap: 15px; margin-bottom: 25px; }
        .level-btn { background: #1e293b; border: 3px solid #facc15; color: #facc15; font-size: 24px; font-weight: bold; width: 75px; height: 75px; border-radius: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .level-btn:active { background: #facc15; color: #1e293b; }
        .level-btn.locked { background: #334155; border-color: #64748b; color: #94a3b8; cursor: not-allowed; opacity: 0.6; }

        #mobileControls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .btn-pad { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255,255,255,0.3); color: white; font-size: 26px; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; touch-action: none; pointer-events: auto; backdrop-filter: blur(3px); }
        .btn-pad:active { background: rgba(255, 255, 255, 0.3); }
        .btn-jump { background: rgba(34, 197, 94, 0.2); border-color: #4ade80; width: 75px; height: 75px; }
        @media (min-width: 900px) { #mobileControls { display: none; } }
        
        #inGameMenu { position: absolute; top: 10px; right: 10px; pointer-events: auto; z-index: 10; }
        .btn-small { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-left: 6px; }
    </style>
</head>
<body>

    <div id="portrait-warning">
        <h2>📱 Please Rotate Your Phone</h2>
        <p>This game is played in Landscape Mode.</p>
    </div>

    <div id="game-wrapper">
        <div id="inGameMenu" class="hidden">
            <button class="btn-small" id="btnPauseMenu">⏸️ Menu</button>
        </div>

        <div id="ui-layer">
            <div id="screen-main" class="ui-screen">
                <h1>SKY CLOUD JUMPER</h1>
                <p>Climb High to the Floating Dojo!</p>
                <button class="btn-menu btn-green" id="btnStartGame">▶ Play</button>
                <button class="btn-menu" id="btnSelectLevel">Levels</button>
                <button class="btn-menu btn-red" id="btnWipeSave" style="font-size: 11px; padding: 6px 12px; margin-top: 15px;">Wipe Save</button>
            </div>

            <div id="screen-levels" class="ui-screen hidden">
                <h2>Select Level</h2>
                <div class="level-grid" id="levelGrid">
                    <button class="level-btn" data-level="0">1</button>
                    <button class="level-btn" data-level="1">2</button>
                    <button class="level-btn" data-level="2">3</button>
                </div>
                <button class="btn-menu btn-red" id="btnBackToMain">Back</button>
            </div>

            <div id="screen-gameover" class="ui-screen hidden">
                <h1 style="color: #ef4444; font-size: 40px;">OUT OF LIVES!</h1>
                <p id="gameOverText">The Sky is ruthless.</p>
                <button class="btn-menu btn-green" id="btnRetry">↺ Retry</button>
                <button class="btn-menu btn-red" id="btnQuit1">Main Menu</button>
            </div>

            <div id="screen-won" class="ui-screen hidden">
                <h1 style="color: #4ade80;">LEVEL CLEAR!</h1>
                <p>Dojo reached!</p>
                <button class="btn-menu btn-green" id="btnNextLevel">Next Level ➔</button>
                <button class="btn-menu" id="btnQuit2">Main Menu</button>
            </div>

            <div id="screen-beaten" class="ui-screen hidden">
                <h1 style="color: #facc15;">SKY MASTER ARPITA!</h1>
                <p>True Ninja spirit. The Floating Temple is yours.</p>
                <button class="btn-menu btn-green" id="btnPlayAgain">Play Again</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="mobileControls" class="hidden">
            <div class="control-group">
                <div class="btn-pad" id="btnLeft">⬅️</div>
                <div class="btn-pad" id="btnRight">➡️</div>
            </div>
            <div class="btn-pad btn-jump" id="btnJump">⬆️ Jump</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const uiLayer = document.getElementById("ui-layer");
        const inGameMenu = document.getElementById("inGameMenu");
        const mobileControls = document.getElementById("mobileControls");
        const screens = document.querySelectorAll(".ui-screen");
        
        // --- RETRO SOUND ENGINE (Updated) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playRetroSound(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
                gainNode.gain.setValueAtTime(0.08, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'coin') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1400, now + 0.1); 
                gainNode.gain.setValueAtTime(0.12, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'stomp') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.15); 
                gainNode.gain.setValueAtTime(0.12, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'die') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.6); 
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            } else if (type === 'win') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(660, now + 0.1);
                osc.frequency.setValueAtTime(880, now + 0.2); osc.frequency.setValueAtTime(1320, now + 0.3); 
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.7);
                osc.start(now); osc.stop(now + 0.7);
            }
        }
        function playCustomSpeech(text) {
            initAudio();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.volume = 0.9; utterance.rate = 1.3; window.speechSynthesis.speak(utterance);
        }

        // --- PROGRESS SYSTEM (Locked Levels) ---
        let highScore = parseInt(localStorage.getItem("ninjaHighScore")) || 0; 
        let score = 0;
        let currentLevel = parseInt(localStorage.getItem("ninjaLevel")) || 0;
        let lives = 5; 
        let unlockedLevel = parseInt(localStorage.getItem("ninjaUnlockedLevel")) || 0;

        function updateLevelSelectUI() {
            document.querySelectorAll(".level-btn").forEach(btn => {
                let lvl = parseInt(btn.getAttribute("data-level"));
                if (lvl > unlockedLevel) {
                    btn.classList.add("locked");
                    btn.innerHTML = "🔒";
                } else {
                    btn.classList.remove("locked");
                    btn.innerHTML = lvl + 1;
                }
            });
        }

        function saveProgress() {
            localStorage.setItem("ninjaLevel", currentLevel);
            localStorage.setItem("ninjaUnlockedLevel", unlockedLevel);
        }

        function showScreen(screenId) {
            screens.forEach(s => s.classList.add("hidden"));
            uiLayer.classList.remove("hidden");
            inGameMenu.classList.add("hidden"); mobileControls.classList.add("hidden");
            if (screenId) document.getElementById(screenId).classList.remove("hidden");
            if (screenId === 'screen-levels') updateLevelSelectUI();
        }

        function startGameUI() { uiLayer.classList.add("hidden"); inGameMenu.classList.remove("hidden"); mobileControls.classList.remove("hidden"); }

        // --- GAME ENGINE ---
        let gameState = "START"; 
        // Camera Variables for Vertical Scrolling!
        let cameraX = 0; let cameraY = 0;
        let walkTimer = 0; let frameCount = 0;
        let player, clouds, coins, enemies, projectiles, particles, pagoda;

        // Level Designs (Re-arranged vertically for climbing)
        const levelData = [
            { // LEVEL 1: Climbing Beginner
                pagoda: { x: 800, y: -400, w: 200, h: 250 }, // High up
                clouds: [
                    { x: 50, y: 350, w: 180, h: 25, type: "solid" },
                    { x: 300, y: 300, w: 160, h: 25, type: "solid" },
                    { x: 450, y: 220, w: 140, h: 25, type: "solid" }, // Going up
                    { x: 250, y: 150, w: 140, h: 25, type: "moving", speed: 1.5, minX: 100, maxX: 400 },
                    { x: 100, y: 60, w: 120, h: 25, type: "solid" }, 
                    { x: 300, y: -30, w: 150, h: 25, type: "solid" },
                    { x: 550, y: -80, w: 140, h: 25, type: "moving", speed: 2, minX: 450, maxX: 700 },
                    { x: 800, y: -150, w: 180, h: 25, type: "solid" }, // Final path
                    { x: 1000, y: -250, w: 120, h: 25, type: "solid" },
                    { x: 800, y: -350, w: 200, h: 25, type: "solid" }
                ],
                coins: [{x: 480, y: 180}, {x: 150, y: 20}, {x: 1050, y: -290}],
                enemies: []
            },
            { // LEVEL 2: Crumbling Sky
                pagoda: { x: 900, y: -500, w: 200, h: 250 },
                clouds: [
                    { x: 50, y: 350, w: 180, h: 25, type: "solid" },
                    { x: 300, y: 300, w: 140, h: 25, type: "crumble", timer: 40 },
                    { x: 500, y: 230, w: 130, h: 25, type: "solid" },
                    { x: 350, y: 150, w: 130, h: 25, type: "crumble", timer: 45 },
                    { x: 150, y: 80, w: 120, h: 25, type: "moving", speed: 2, minX: 50, maxX: 300 },
                    { x: 350, y: 0, w: 120, h: 25, type: "solid" },
                    { x: 600, y: -60, w: 130, h: 25, type: "crumble", timer: 35 },
                    { x: 800, y: -130, w: 150, h: 25, type: "moving", speed: 2.5, minX: 700, maxX: 950 },
                    { x: 1050, y: -200, w: 120, h: 25, type: "crumble", timer: 30 },
                    { x: 900, y: -280, w: 150, h: 25, type: "solid" },
                    { x: 1100, y: -380, w: 130, h: 25, type: "crumble", timer: 25 },
                    { x: 900, y: -450, w: 200, h: 25, type: "solid" }
                ],
                coins: [{x: 550, y: 180}, {x: 400, y: -50}, {x: 950, y: -330}],
                enemies: [{ x: 550, y: 200, w: 20, h: 10, type: "patrol", speed: 3, minX: 500, maxX: 630 }]
            },
            { // LEVEL 3: Shuriken Storm
                pagoda: { x: 50, y: -650, w: 200, h: 250 },
                clouds: [
                    { x: 50, y: 350, w: 180, h: 25, type: "solid" },
                    { x: 300, y: 310, w: 140, h: 25, type: "moving", speed: 3, minX: 100, maxX: 500 },
                    { x: 650, y: 260, w: 130, h: 25, type: "solid" },
                    { x: 850, y: 190, w: 140, h: 25, type: "crumble", timer: 35 },
                    { x: 650, y: 120, w: 120, h: 25, type: "moving", speed: 4, minX: 500, maxX: 900 },
                    { x: 400, y: 50, w: 110, h: 25, type: "solid" },
                    { x: 150, y: -10, w: 120, h: 25, type: "crumble", timer: 30 },
                    { x: 400, y: -70, w: 130, h: 25, type: "moving", speed: 3, minX: 300, maxX: 600 },
                    { x: 700, y: -130, w: 140, h: 25, type: "solid" },
                    { x: 900, y: -210, w: 130, h: 25, type: "crumble", timer: 25 },
                    { x: 700, y: -300, w: 130, h: 25, type: "moving", speed: 4, minX: 400, maxX: 800 },
                    { x: 300, y: -370, w: 120, h: 25, type: "solid" },
                    { x: 100, y: -440, w: 120, h: 25, type: "moving", speed: 3, minX: 50, maxX: 300 },
                    { x: 300, y: -530, w: 130, h: 25, type: "crumble", timer: 20 },
                    { x: 50, y: -600, w: 200, h: 25, type: "solid" }
                ],
                coins: [{x: 700, y: 210}, {x: 750, y: -180}, {x: 350, y: -420}],
                enemies: [
                    { x: 850, y: 150, w: 20, h: 40, type: "shooter", cooldown: 180, timer: 0 },
                    { x: 700, y: -170, w: 20, h: 40, type: "shooter", cooldown: 160, timer: 0 },
                    { x: 300, y: -410, w: 20, h: 40, type: "shooter", cooldown: 140, timer: 0 }
                ]
            }
        ];

        // Controls input
        const keys = { right: false, left: false };
        window.addEventListener("keydown", (e) => {
            if (e.code === "ArrowRight") keys.right = true;
            if (e.code === "ArrowLeft") keys.left = true;
            if (e.code === "ArrowUp" || e.code === "Space") handleJump();
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowRight") keys.right = false;
            if (e.code === "ArrowLeft") keys.left = false;
        });

        // Touch input listeners
        document.getElementById("btnLeft").addEventListener("touchstart", (e) => { e.preventDefault(); keys.left = true; });
        document.getElementById("btnLeft").addEventListener("touchend", (e) => { e.preventDefault(); keys.left = false; });
        document.getElementById("btnRight").addEventListener("touchstart", (e) => { e.preventDefault(); keys.right = true; });
        document.getElementById("btnRight").addEventListener("touchend", (e) => { e.preventDefault(); keys.right = false; });
        document.getElementById("btnJump").addEventListener("touchstart", (e) => { e.preventDefault(); handleJump(); });

        function handleJump() {
            initAudio(); // Essential for unlocking audio context on mobile
            if (gameState === "PLAYING" && player.jumps < player.maxJumps) {
                player.dy = player.jumpPower; player.grounded = false; player.jumps++;
                playRetroSound('jump');
                createParticles(player.x + 10, player.y + 10, "white", 12);
            }
        }

        async function attemptFullscreen() {
            if (document.documentElement.requestFullscreen) {
                try {
                    await document.documentElement.requestFullscreen();
                    screen.orientation.lock("landscape").catch(e=>{}); 
                } catch(e){}
            }
        }

        // --- UI BUTTON LISTENERS ---
        document.getElementById("btnStartGame").onclick = () => { if(currentLevel > unlockedLevel) currentLevel = unlockedLevel; loadLevel(currentLevel); };
        document.getElementById("btnSelectLevel").onclick = () => { showScreen('screen-levels'); };
        document.getElementById("btnWipeSave").onclick = () => { if(confirm("Are you sure? This locks all levels except Level 1!")) { localStorage.removeItem("ninjaUnlockedLevel"); localStorage.removeItem("ninjaLevel"); localStorage.removeItem("ninjaHighScore"); unlockedLevel = 0; currentLevel = 0; highScore = 0; saveProgress(); updateLevelSelectUI(); showScreen('screen-main'); alert("Save Wiped."); } };
        document.getElementById("btnBackToMain").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnRetry").onclick = () => { lives = 5; score = 0; loadLevel(currentLevel); };
        document.getElementById("btnNextLevel").onclick = () => { loadLevel(currentLevel); };
        document.getElementById("btnPlayAgain").onclick = () => { currentLevel=0; lives=5; score=0; loadLevel(0); };
        document.getElementById("btnQuit1").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnQuit2").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnPauseMenu").onclick = () => { gameState = "MENU"; showScreen('screen-main'); };

        document.querySelectorAll(".level-btn").forEach(btn => {
            btn.onclick = (e) => {
                let lvl = parseInt(e.target.getAttribute("data-level"));
                if (lvl > unlockedLevel) { e.target.style.transform = "translate(4px, 0)"; setTimeout(() => e.target.style.transform = "none", 80); return; }
                currentLevel = lvl; lives = 5; score = 0; saveProgress(); loadLevel(currentLevel);
            };
        });

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 7, vy: (Math.random() - 0.5) * 7, life: 1.0, color: color, size: Math.random() * 4 + 1 });
            }
        }

        function loadLevel(index) {
            let data = levelData[index];
            player = { x: 50, y: 300, width: 22, height: 42, dx: 0, dy: 0, speed: 5.5, jumpPower: -11.5, gravity: 0.6, grounded: false, jumps: 0, maxJumps: 2 };
            cameraX = 0; cameraY = 0; frameCount = 0; particles = []; projectiles = [];
            pagoda = { ...data.pagoda };
            clouds = JSON.parse(JSON.stringify(data.clouds));
            clouds.forEach(c => { if(c.type === "crumble") c.steppedOn = false; });
            coins = JSON.parse(JSON.stringify(data.coins)).map(c => ({...c, r: 10, collected: false}));
            enemies = JSON.parse(JSON.stringify(data.enemies));
            gameState = "PLAYING";
            startGameUI();
        }

        function die() {
            lives--; playRetroSound('die'); createParticles(player.x + 11, player.y + 21, "red", 25);
            if (lives > 0) { loadLevel(currentLevel); }
            else { gameState = "GAMEOVER"; showScreen('screen-gameover'); }
        }

        function update() {
            if (gameState !== "PLAYING") return;
            frameCount++;

            if (keys.right) { player.x += player.speed; walkTimer++; player.dx = 1; }
            else if (keys.left) { player.x -= player.speed; walkTimer++; player.dx = -1; }
            else { player.dx = 0; walkTimer = 0; }
            
            player.dy += player.gravity; player.y += player.dy;

            // Drown/Fall limit updated to camera view!
            if (player.y > cameraY + canvas.height + 150) die(); 

            player.grounded = false;
            for (let i = clouds.length - 1; i >= 0; i--) {
                let c = clouds[i];
                if (c.type === "moving") {
                    c.x += c.speed;
                    if (c.x > c.maxX || c.x < c.minX) c.speed *= -1;
                }
                if (c.type === "crumble" && c.steppedOn) {
                    c.timer--;
                    if (c.timer <= 0) {
                        createParticles(c.x + c.w/2, c.y, "#93c5fd", 25);
                        clouds.splice(i, 1); continue;
                    }
                }

                if (player.dy >= 0 && player.x < c.x + c.w && player.x + player.width > c.x &&
                    player.y + player.height >= c.y && player.y + player.height <= c.y + c.h + player.dy) {
                        player.grounded = true; player.jumps = 0; player.dy = 0;
                        player.y = c.y - player.height;
                        if (c.type === "moving") player.x += c.speed; 
                        if (c.type === "crumble") c.steppedOn = true; 
                }
            }

            // Enemy & Stomp Logic
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.type === "patrol") {
                    e.x += e.speed; if (e.x > e.maxX || e.x < e.minX) e.speed *= -1;
                } else if (e.type === "shooter") {
                    e.timer++;
                    if (e.timer >= e.cooldown) { e.timer = 0; projectiles.push({ x: e.x, y: e.y + 10, vx: -2.8, w: 10, h: 10 }); }
                }

                if (player.x < e.x + e.w && player.x + player.width > e.x && player.y < e.y + e.h && player.y + player.height > e.y) {
                    if (player.dy > 0 && player.y + player.height < e.y + 16) { // Stomp check
                        enemies.splice(i, 1); player.dy = -8.5; score += 100; playRetroSound('stomp'); createParticles(e.x + e.w/2, e.y, "#ef4444", 35); 
                    } else { die(); }
                }
            }

            for (let p of projectiles) {
                p.x += p.vx;
                if (player.x < p.x + p.w && player.x + player.width > p.x && player.y < p.y + p.h && player.y + player.height > p.y) die();
            }

            for (let coin of coins) {
                if (!coin.collected && player.x < coin.x + coin.r && player.x + player.width > coin.x - coin.r &&
                    player.y < coin.y + coin.r && player.y + player.height > coin.y - coin.r) {
                        coin.collected = true; score += 50; playRetroSound('coin'); createParticles(coin.x, coin.y, "#facc15", 25);
                        if (score > highScore) { highScore = score; localStorage.setItem("ninjaHighScore", highScore); }
                }
            }

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.035; p.size *= 0.98; });
            particles = particles.filter(p => p.life > 0);

            // Level Complete Trigger
            if (player.x + player.width > pagoda.x && player.y + player.height > pagoda.y && player.y + player.height < pagoda.y + pagoda.h) {
                gameState = "WON"; playRetroSound('win'); 
                if (currentLevel >= unlockedLevel && currentLevel < levelData.length - 1) unlockedLevel = currentLevel + 1;
                currentLevel++; saveProgress();
                if (currentLevel >= levelData.length) { gameState = "BEATEN"; unlockedLevel = levelData.length - 1; currentLevel = 0; saveProgress(); showScreen('screen-beaten'); }
                else { showScreen('screen-won'); }
            }

            // --- ADVANCED CAMERA: HORIZONTAL + VERTICAL SCROLLING ---
            // Horizontal centering
            cameraX = player.x - canvas.width * 0.35; 
            
            // Vertical scrolling: Start scrolling up when player gets above middle
            let targetCameraY = player.y - canvas.height * 0.6;
            // Smooth vertical camera follows player up, less aggressive down
            if (player.y < cameraY + canvas.height * 0.4) { // Player is too high in view
                 cameraY += (targetCameraY - cameraY) * 0.1; // Smooth scroll up
            } else if (player.y > cameraY + canvas.height * 0.8) { // Player too low in view
                 cameraY += (targetCameraY - cameraY) * 0.05; // Smooth scroll down, slower
            }
            
            // Limit camera to never go *below* the starting floor level (roughly)
            if (cameraY > 50) cameraY = 50; 
        }

        // --- DRAWING FUNCTIONS ---

        // NEW ADVANCED Radial Cloud drawing
        function drawRealisticCloud(ctx, x, y, w, h, baseColor, isCrumbling, steppedOn) {
            ctx.save();
            let shake = (isCrumbling && steppedOn) ? (Math.random() - 0.5) * 5 : 0;
            ctx.translate(x + shake, y);

            if (isCrumbling && steppedOn) ctx.globalAlpha = 0.6; // Start fading

            // Helper to draw puffy circles
            function drawPuff(px, py, pr, color1, color2) {
                let grad = ctx.createRadialGradient(px, py, pr*0.2, px, py, pr);
                grad.addColorStop(0, color1); grad.addColorStop(1, color2);
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.fill();
            }

            let c1 = (isCrumbling && steppedOn) ? "rgba(255,180,180,1)" : "rgba(255,255,255,1)";
            let c2 = (isCrumbling && steppedOn) ? "rgba(200,100,100,0.4)" : "rgba(255,255,255,0.1)"; // Transparency!
            if (baseColor === "#7dd3fc") { // Moving clouds
                c1 = "rgba(125,211,252,1)"; c2 = "rgba(125,211,252,0.2)";
            }

            // Draw base platform (for collision logic, slightly visible)
            ctx.fillStyle = c2; ctx.beginPath(); ctx.roundRect(0, 0, w, h, h/2); ctx.fill();

            // Draw Puffy Puffs
            let puffR = h * 0.9;
            // Bottom Puffs
            for(let i=0; i<w; i+= puffR * 0.8) { drawPuff(i, h*0.7, puffR, c1, c2); }
            // Top Puffs (more transparent)
            ctx.globalAlpha *= 0.8;
            for(let i=10; i<w; i+= puffR * 0.9) { drawPuff(i, -h*0.2, puffR*1.1, c1, "rgba(255,255,255,0)"); }

            ctx.restore();
        }

        // DRAW PAGODA (No mountain peak, floating!)
        function drawPagoda(ctx, mX, mY, mW, mH) {
            ctx.save(); ctx.translate(mX, mY);

            // Subtle glow/mist behind pagoda
            let mist = ctx.createRadialGradient(mW/2, mH/2, mW*0.1, mW/2, mH/2, mW);
            mist.addColorStop(0, "rgba(100,200,255,0.3)"); mist.addColorStop(1, "rgba(100,200,255,0)");
            ctx.fillStyle = mist; ctx.beginPath(); ctx.arc(mW/2, mH/2, mW, 0, Math.PI*2); ctx.fill();

            // Pagoda Sits on its own small floating cloud foundation
            drawRealisticCloud(ctx, mW/2 - 70, mH - 30, 140, 30, "white", false, false);

            let dX = mW / 2; let dY = mH - 10;
            // Structure Base (SF set manually)
            let SF = 1.9;
            ctx.fillStyle = "#475569"; ctx.fillRect(dX - 50*SF, dY - 10*SF, 100*SF, 10*SF); // Foundation
            // First Floor
            ctx.fillStyle = "#78350f"; ctx.fillRect(dX - 40*SF, dY - 40*SF, 80*SF, 30*SF);
            ctx.fillStyle = "#fef3c7"; ctx.fillRect(dX - 15*SF, dY - 30*SF, 30*SF, 20*SF); // Shoji Screen Door
            ctx.fillStyle = "#000"; ctx.fillRect(dX - 1*SF, dY - 30*SF, 2*SF, 20*SF); ctx.fillRect(dX - 15*SF, dY - 20*SF, 30*SF, 2*SF); 
            // First Roof
            ctx.fillStyle = "#b91c1c"; ctx.beginPath(); ctx.moveTo(dX - 60*SF, dY - 40*SF); ctx.quadraticCurveTo(dX - 40*SF, dY - 58*SF, dX, dY - 58*SF); ctx.quadraticCurveTo(dX + 40*SF, dY - 58*SF, dX + 60*SF, dY - 40*SF); ctx.lineTo(dX + 50*SF, dY - 40*SF); ctx.quadraticCurveTo(dX, dY - 52*SF, dX - 50*SF, dY - 40*SF); ctx.fill();
            // Second Floor
            ctx.fillStyle = "#78350f"; ctx.fillRect(dX - 30*SF, dY - 75*SF, 60*SF, 25*SF);
            ctx.fillStyle = "#fef3c7"; ctx.fillRect(dX - 10*SF, dY - 70*SF, 20*SF, 15*SF); ctx.fillStyle = "#000"; ctx.fillRect(dX - 1*SF, dY - 70*SF, 2*SF, 15*SF);
            // Top Roof
            ctx.fillStyle = "#b91c1c"; ctx.beginPath(); ctx.moveTo(dX - 50*SF, dY - 75*SF); ctx.quadraticCurveTo(dX - 25*SF, dY - 105*SF, dX, dY - 105*SF); ctx.quadraticCurveTo(dX + 25*SF, dY - 105*SF, dX + 50*SF, dY - 75*SF); ctx.lineTo(dX + 40*SF, dY - 75*SF); ctx.quadraticCurveTo(dX, dY - 95*SF, dX - 40*SF, dY - 75*SF); ctx.fill();
            // Golden Spire
            ctx.fillStyle = "#facc15"; ctx.fillRect(dX - 2*SF, dY - 125*SF, 4*SF, 20*SF); ctx.beginPath(); ctx.arc(dX, dY - 125*SF, 4*SF, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState !== "PLAYING") return; 

            // Dynamic Starry Background (follows camera slightly for parallax)
            ctx.save();
            ctx.fillStyle = "white";
            for(let i=0; i<100; i++) {
                let sX = (Math.sin(i) * 5000 - cameraX * 0.1) % canvas.width;
                if(sX < 0) sX += canvas.width;
                let sY = (Math.cos(i) * 5000 - cameraY * 0.1) % canvas.height;
                if(sY < 0) sY += canvas.height;
                ctx.globalAlpha = Math.random() * 0.5 + 0.2;
                ctx.beginPath(); ctx.arc(sX, sY, Math.random() * 2, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();

            ctx.save();
            ctx.translate(-cameraX, -cameraY); // Horizontal + VERTICAL Translation!

            // Draw Floating Dojo
            drawPagoda(ctx, pagoda.x, pagoda.y, pagoda.w, pagoda.h);

            // Draw Clouds
            for (let c of clouds) {
                let color = c.type === "moving" ? "#7dd3fc" : (c.type === "crumble" ? "#cbd5e1" : "white");
                drawRealisticCloud(ctx, c.x, c.y, c.w, c.h, color, c.type === "crumble", c.steppedOn);
            }

            for (let coin of coins) {
                if (!coin.collected) {
                    ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#ca8a04"; ctx.beginPath(); ctx.arc(coin.x, coin.y, coin.r - 3, 0, Math.PI * 2); ctx.fill();
                }
            }

            // Enemies
            for (let e of enemies) {
                if (e.type === "patrol") { 
                    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x + 10, e.y + (frameCount % 10 < 5 ? 12 : -6)); ctx.lineTo(e.x + 20, e.y); ctx.stroke();
                    ctx.lineWidth = 3; ctx.strokeStyle = "#ef4444"; ctx.stroke();
                } else if (e.type === "shooter") { 
                    ctx.fillStyle = "#991b1b"; ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.fillStyle = "#fed7aa"; ctx.fillRect(e.x - 2, e.y + 5, 10, 6); 
                }
            }

            // Projectiles
            ctx.fillStyle = "#cbd5e1";
            for (let p of projectiles) {
                ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2); ctx.rotate(frameCount * 0.6); ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
            }

            // Particles
            for (let p of particles) {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0; 

            // --- NEW POLISHED ANIME GIRL CHARACTER ---
            ctx.save();
            ctx.translate(player.x, player.y);
            
            let flip = (player.dx === -1) ? -1 : 1;
            if (flip === -1) ctx.translate(player.width, 0); // Correct flip
            ctx.scale(flip, 1);

            let breath = Math.sin(frameCount * 0.1) * 1;
            let hairSway = Math.sin(frameCount * 0.15) * 2;

            // 1. Long Hair (Back)
            ctx.fillStyle = "#ef4444"; // Vivid Red Hair
            ctx.beginPath();
            ctx.moveTo(player.width/2 - 5, 5);
            ctx.quadraticCurveTo(-15 + hairSway, player.height/2, player.width/2 - 10, player.height + 5); // Swaying hair
            ctx.quadraticCurveTo(player.width/2, player.height+10, player.width+10, player.height/2);
            ctx.closePath(); ctx.fill();

            // 2. Head/Face
            ctx.fillStyle = "#fee2e2"; // Pale skin
            ctx.beginPath(); ctx.roundRect(5, 0 + breath, 15, 18, 5); ctx.fill();

            // Eyes
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(10, 8+breath, 3, 0, Math.PI*2); ctx.arc(17, 8+breath, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#1e40af"; // Blue eyes
            ctx.beginPath(); ctx.arc(11, 8+breath, 1.5, 0, Math.PI*2); ctx.arc(18, 8+breath, 1.5, 0, Math.PI*2); ctx.fill();

            // Bangs (Hawa mein urenge)
            ctx.fillStyle = "#ef4444";
            ctx.beginPath(); ctx.moveTo(4, 1+breath); ctx.lineTo(12, 10+breath); ctx.lineTo(20, 1+breath); ctx.fill();

            // 3. Dress (Shirt)
            ctx.fillStyle = "#b91c1c"; // Dark Red Dress
            ctx.fillRect(5, 18, 15, 20); 
            // Sleeves
            ctx.fillRect(-1, 20+breath, 6, 8); ctx.fillRect(20, 20+breath, 6, 8);
            ctx.fillStyle = "#fee2e2"; ctx.fillRect(0, 26+breath, 4, 4); ctx.fillRect(21, 26+breath, 4, 4); // Hands

            // Skirt (Puffy)
            ctx.fillStyle = "#ef4444";
            ctx.beginPath(); ctx.moveTo(2, 35); ctx.lineTo(23, 35); ctx.lineTo(26, 45); ctx.lineTo(-1, 45); ctx.closePath(); ctx.fill();

            // 4. Legs
            ctx.fillStyle = "#fee2e2"; 
            let legOffset = (walkTimer % 10 < 5 && player.grounded && (player.dx !==0)) ? 6 : 0;
            ctx.fillRect(6 - legOffset, 42, 6, 12); // Leg 1
            ctx.fillRect(14 + legOffset, 42, 6, 12); // Leg 2
            
            ctx.restore(); 

            ctx.restore(); 

            // HTML UI displays Score & Lives now, but let's keep it on canvas for gameplay too
            let uiScale = canvas.width / 800; 
            ctx.fillStyle = "white"; ctx.font = `bold ${18 * uiScale}px 'Segoe UI'`;
            ctx.fillText("Score: " + score, 15 * uiScale, 25 * uiScale);
            ctx.fillStyle = "#facc15"; ctx.fillText("Lives: " + "❤️".repeat(lives), canvas.width - (110 * uiScale), 25 * uiScale); 
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        
        // Setup initial UI
        updateLevelSelectUI(); showScreen('screen-main'); loop(); 
    </script>
</body>
