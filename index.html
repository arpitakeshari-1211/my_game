<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Ninja: Arpita's Quest</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0c1120; font-family: 'Impact', 'Arial Black', sans-serif; overflow: hidden; user-select: none; }
        
        #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media (max-width: 899px) and (orientation: portrait) { #portrait-warning { display: flex; } #game-wrapper { display: none !important; } }

        #game-wrapper { position: relative; width: 100%; max-width: 800px; height: 100%; max-height: 400px; border: 6px solid #1e293b; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); background: #000; }
        
        canvas { background: linear-gradient(to bottom, #0f172a 0%, #1d4ed8 50%, #7dd3fc 100%); width: 100%; height: 100%; touch-action: none; display: block; }

        /* UI LAYER */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0f172a; border: 8px solid #facc15; box-sizing: border-box; z-index: 50; text-align: center; color: white; }
        .hidden { display: none !important; }
        
        h1 { margin: 0 0 10px 0; font-size: 46px; color: #fff; text-shadow: 4px 4px 0 #ef4444, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; letter-spacing: 2px; }
        h2 { margin: 0 0 20px 0; font-size: 32px; color: #facc15; text-shadow: 3px 3px 0 #000; }
        p { margin-bottom: 25px; font-size: 20px; color: #fff; text-shadow: 2px 2px 0 #000; font-family: 'Arial', sans-serif; font-weight: bold; }

        .btn-menu { background: #3b82f6; border: 4px solid #000; border-bottom-width: 8px; color: white; font-size: 20px; font-family: 'Impact', sans-serif; padding: 12px 40px; margin: 10px; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0 #000; transition: transform 0.05s, border-bottom-width 0.05s; }
        .btn-menu:active { transform: translateY(4px); border-bottom-width: 4px; margin-bottom: 14px; }
        .btn-green { background: #22c55e; } .btn-red { background: #ef4444; }
        
        .level-grid { display: flex; gap: 20px; margin-bottom: 25px; }
        .level-btn { background: #3b82f6; border: 4px solid #000; border-bottom-width: 8px; color: white; font-size: 30px; font-family: 'Impact', sans-serif; width: 80px; height: 80px; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; text-shadow: 2px 2px 0 #000; }
        .level-btn:active { transform: translateY(4px); border-bottom-width: 4px; }
        .level-btn.locked { background: #475569; border-color: #1e293b; color: #94a3b8; cursor: not-allowed; text-shadow: none; }

        /* MOBILE CONTROLS */
        #mobileControls { position: absolute; bottom: 15px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .control-group { display: flex; gap: 10px; pointer-events: auto; }
        .btn-pad { background: rgba(0, 0, 0, 0.7); border: 4px solid #fff; border-bottom-width: 8px; color: white; font-size: 24px; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; touch-action: none; pointer-events: auto; }
        .btn-pad:active { transform: translateY(4px); border-bottom-width: 4px; background: rgba(50, 50, 50, 0.9); }
        .btn-jump { background: rgba(34, 197, 94, 0.8); width: 75px; height: 75px; font-weight: bold; }
        .btn-dash { background: rgba(59, 130, 246, 0.8); width: 65px; height: 65px; font-size: 18px; font-weight: bold;}
        @media (min-width: 900px) { #mobileControls { display: none; } }
        
        #inGameMenu { position: absolute; top: 15px; right: 15px; pointer-events: auto; z-index: 10; }
        .btn-small { background: #000; border: 3px solid #fff; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; text-transform: uppercase; }
        .btn-small:active { background: #333; }
        
        /* Keyboard hints */
        #pc-hints { position: absolute; bottom: 10px; left: 10px; color: rgba(255,255,255,0.7); font-family: Arial; font-size: 14px; pointer-events: none; }
        @media (max-width: 899px) { #pc-hints { display: none; } }
    </style>
</head>
<body>

    <div id="portrait-warning">
        <h2 style="color:white; font-family:Arial;">📱 Please Rotate Your Phone</h2>
    </div>

    <div id="game-wrapper">
        <div id="inGameMenu" class="hidden"><button class="btn-small" id="btnPauseMenu">PAUSE</button></div>
        <div id="pc-hints" class="hidden">Use <strong>ARROW KEYS</strong> to move/jump. Press <strong>SHIFT</strong> to DASH.</div>

        <div id="ui-layer">
            <div id="screen-main" class="ui-screen">
                <h1>SKY NINJA ACTION</h1>
                <p>Dash, Bounce, and Wall Jump to the Dojo!</p>
                <button class="btn-menu btn-green" id="btnStartGame">PLAY GAME</button>
                <button class="btn-menu" id="btnSelectLevel">SELECT LEVEL</button>
                <br><button class="btn-menu btn-red" id="btnWipeSave" style="font-size: 14px; padding: 8px 15px; margin-top: 20px;">WIPE SAVES</button>
            </div>

            <div id="screen-levels" class="ui-screen hidden">
                <h2>SELECT LEVEL</h2>
                <div class="level-grid" id="levelGrid">
                    <button class="level-btn" data-level="0">1</button>
                    <button class="level-btn" data-level="1">2</button>
                    <button class="level-btn" data-level="2">3</button>
                </div>
                <button class="btn-menu btn-red" id="btnBackToMain">BACK</button>
            </div>

            <div id="screen-gameover" class="ui-screen hidden">
                <h1 style="color: #ef4444; text-shadow: 4px 4px 0 #000;">GAME OVER</h1>
                <p id="gameOverText">YOU FELL FROM THE SKY!</p>
                <button class="btn-menu btn-green" id="btnRetry">RETRY LEVEL</button>
                <button class="btn-menu btn-red" id="btnQuit1">MAIN MENU</button>
            </div>

            <div id="screen-won" class="ui-screen hidden">
                <h1 style="color: #4ade80; text-shadow: 4px 4px 0 #000;">LEVEL CLEAR</h1>
                <p>YOU REACHED THE DOJO!</p>
                <button class="btn-menu btn-green" id="btnNextLevel">NEXT LEVEL</button>
                <button class="btn-menu" id="btnQuit2">MAIN MENU</button>
            </div>

            <div id="screen-beaten" class="ui-screen hidden">
                <h1 style="color: #facc15; text-shadow: 4px 4px 0 #000;">NINJA MASTER</h1>
                <p>ARPITA HAS CONQUERED THE SKIES!</p>
                <button class="btn-menu btn-green" id="btnPlayAgain">PLAY AGAIN</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="mobileControls" class="hidden">
            <div class="control-group">
                <div class="btn-pad" id="btnLeft">⬅</div>
                <div class="btn-pad" id="btnRight">➡</div>
            </div>
            <div class="control-group">
                <div class="btn-pad btn-dash" id="btnDash">DASH</div>
                <div class="btn-pad btn-jump" id="btnJump">JUMP</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const uiLayer = document.getElementById("ui-layer");
        const inGameMenu = document.getElementById("inGameMenu");
        const mobileControls = document.getElementById("mobileControls");
        const pcHints = document.getElementById("pc-hints");
        const screens = document.querySelectorAll(".ui-screen");
        
        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSound(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination); const now = audioCtx.currentTime;
            
            if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(250, now); osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
                gainNode.gain.setValueAtTime(0.08, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'dash') {
                osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'bounce') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(800, now + 0.2);
                gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'gem') {
                osc.type = 'square'; osc.frequency.setValueAtTime(1000, now); osc.frequency.setValueAtTime(1500, now + 0.1); osc.frequency.setValueAtTime(2000, now + 0.2);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'die') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.6); 
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        // --- PROGRESS SYSTEM ---
        let highScore = parseInt(localStorage.getItem("ninjaHighScore")) || 0; 
        let score = 0; let currentLevel = parseInt(localStorage.getItem("ninjaLevel")) || 0; let lives = 5; 
        let unlockedLevel = parseInt(localStorage.getItem("ninjaUnlockedLevel")) || 0;

        function updateLevelSelectUI() {
            document.querySelectorAll(".level-btn").forEach(btn => {
                let lvl = parseInt(btn.getAttribute("data-level"));
                if (lvl > unlockedLevel) { btn.classList.add("locked"); btn.innerHTML = "🔒"; } 
                else { btn.classList.remove("locked"); btn.innerHTML = lvl + 1; }
            });
        }
        function saveProgress() { localStorage.setItem("ninjaLevel", currentLevel); localStorage.setItem("ninjaUnlockedLevel", unlockedLevel); }
        function showScreen(screenId) {
            screens.forEach(s => s.classList.add("hidden")); uiLayer.classList.remove("hidden");
            inGameMenu.classList.add("hidden"); mobileControls.classList.add("hidden"); pcHints.classList.add("hidden");
            if (screenId) document.getElementById(screenId).classList.remove("hidden");
            if (screenId === 'screen-levels') updateLevelSelectUI();
        }
        function startGameUI() { 
            uiLayer.classList.add("hidden"); inGameMenu.classList.remove("hidden"); 
            mobileControls.classList.remove("hidden"); pcHints.classList.remove("hidden");
            initAudio();
        }

        // --- GAME ENGINE ---
        let gameState = "START"; 
        let cameraX = 0; let cameraY = 0; let walkTimer = 0; let frameCount = 0;
        let player, clouds, coins, gems, enemies, projectiles, particles, pagoda;

        // NEW BALANCED LEVELS (Heights squashed so they are much easier to reach!)
        const levelData = [
            { // Level 1
                pagoda: { x: 1000, y: -350, w: 200, h: 250 }, // Base sits at y: -100
                clouds: [
                    { x: 50, y: 350, w: 250, h: 30, type: "solid" }, 
                    { x: 400, y: 300, w: 150, h: 30, type: "solid" },
                    { x: 650, y: 250, w: 100, h: 30, type: "bounce" }, // BOUNCE PAD
                    { x: 300, y: 50, w: 150, h: 30, type: "solid" }, 
                    { x: 550, y: 0, w: 150, h: 30, type: "moving", speed: 2, minX: 500, maxX: 750 },
                    { x: 800, y: -50, w: 150, h: 30, type: "solid" }, 
                    { x: 1000, y: -100, w: 250, h: 30, type: "solid" } 
                ],
                coins: [{x: 480, y: 250}, {x: 350, y: 0}],
                gems: [{x: 700, y: 80}], 
                enemies: []
            },
            { // Level 2
                pagoda: { x: 100, y: -550, w: 200, h: 250 }, // Base sits at y: -300
                clouds: [
                    { x: 50, y: 350, w: 200, h: 30, type: "solid" },
                    { x: 350, y: 250, w: 80, h: 200, type: "solid" }, // Wall 1
                    { x: 550, y: 150, w: 80, h: 200, type: "solid" }, // Wall 2
                    { x: 300, y: -50, w: 100, h: 30, type: "bounce" }, 
                    { x: 150, y: -200, w: 80, h: 150, type: "solid" }, // High wall
                    { x: 400, y: -250, w: 150, h: 30, type: "crumble", timer: 40 },
                    { x: 600, y: -300, w: 150, h: 30, type: "moving", speed: 3, minX: 500, maxX: 700 },
                    { x: 100, y: -300, w: 250, h: 30, type: "solid" }
                ],
                coins: [{x: 480, y: 150}, {x: 650, y: -250}],
                gems: [{x: 450, y: 50}, {x: 250, y: -150}], 
                enemies: [{ x: 600, y: -310, w: 20, h: 10, type: "patrol", speed: 3, minX: 500, maxX: 700 }]
            },
            { // Level 3
                pagoda: { x: 1200, y: -550, w: 200, h: 250 }, // Base sits at y: -300
                clouds: [
                    { x: 50, y: 350, w: 150, h: 30, type: "solid" },
                    { x: 350, y: 350, w: 150, h: 30, type: "solid" }, // Dash Gap
                    { x: 650, y: 280, w: 150, h: 30, type: "moving", speed: 4, minX: 600, maxX: 850 },
                    { x: 1000, y: 200, w: 80, h: 150, type: "solid" }, // Wall
                    { x: 750, y: 100, w: 100, h: 30, type: "bounce" }, 
                    { x: 450, y: -50, w: 150, h: 30, type: "crumble", timer: 30 },
                    { x: 200, y: -150, w: 80, h: 150, type: "solid" }, // Wall
                    { x: 500, y: -200, w: 100, h: 30, type: "bounce" },
                    { x: 800, y: -300, w: 150, h: 30, type: "crumble", timer: 20 },
                    { x: 1200, y: -300, w: 250, h: 30, type: "solid" }
                ],
                coins: [{x: 250, y: 300}, {x: 800, y: 200}, {x: 850, y: -350}],
                gems: [{x: 500, y: 300}, {x: 900, y: -50}, {x: 350, y: -150}],
                enemies: [
                    { x: 400, y: 310, w: 20, h: 40, type: "shooter", cooldown: 150, timer: 0 },
                    { x: 1250, y: -340, w: 20, h: 40, type: "shooter", cooldown: 120, timer: 0 }
                ]
            }
        ];

        // --- INPUT HANDLING ---
        const keys = { right: false, left: false, dash: false };
        window.addEventListener("keydown", (e) => { 
            if(e.code==="ArrowRight") keys.right=true; 
            if(e.code==="ArrowLeft") keys.left=true; 
            if(e.code==="ArrowUp"||e.code==="Space") handleJump(); 
            if(e.code==="ShiftLeft"||e.code==="ShiftRight"||e.code==="KeyZ") handleDash();
        });
        window.addEventListener("keyup", (e) => { 
            if(e.code==="ArrowRight") keys.right=false; 
            if(e.code==="ArrowLeft") keys.left=false; 
        });

        // Touch Input
        const btnLeft = document.getElementById("btnLeft"); const btnRight = document.getElementById("btnRight");
        const btnJump = document.getElementById("btnJump"); const btnDash = document.getElementById("btnDash");
        
        btnLeft.addEventListener("touchstart", (e) => { e.preventDefault(); keys.left = true; });
        btnLeft.addEventListener("touchend", (e) => { e.preventDefault(); keys.left = false; });
        btnRight.addEventListener("touchstart", (e) => { e.preventDefault(); keys.right = true; });
        btnRight.addEventListener("touchend", (e) => { e.preventDefault(); keys.right = false; });
        btnJump.addEventListener("touchstart", (e) => { e.preventDefault(); handleJump(); });
        btnDash.addEventListener("touchstart", (e) => { e.preventDefault(); handleDash(); });

        function handleJump() {
            initAudio();
            if (gameState !== "PLAYING") return;
            
            if (player.touchingWall !== 0 && !player.grounded) {
                player.dy = player.jumpPower * 0.9;
                player.jumps = 1; 
                player.dashCooldown = 0; 
                playSound('jump');
                createParticles(player.x + (player.touchingWall===1 ? player.width : 0), player.y + 20, "white", 10);
            }
            else if (player.jumps < player.maxJumps) {
                player.dy = player.jumpPower;
                player.grounded = false; player.jumps++;
                playSound('jump');
                createParticles(player.x + 10, player.y + 40, "white", 10);
            }
        }

        function handleDash() {
            initAudio();
            if (gameState === "PLAYING" && player.dashCooldown <= 0 && player.dashTimer <= 0) {
                player.dashTimer = 12; 
                player.dashCooldown = 60; 
                playSound('dash');
            }
        }

        // --- UI CLICKS ---
        document.getElementById("btnStartGame").onclick = () => { if(currentLevel > unlockedLevel) currentLevel = unlockedLevel; loadLevel(currentLevel); };
        document.getElementById("btnSelectLevel").onclick = () => { showScreen('screen-levels'); };
        document.getElementById("btnWipeSave").onclick = () => { if(confirm("Are you sure? This locks all levels!")) { localStorage.clear(); unlockedLevel=0; currentLevel=0; highScore=0; saveProgress(); showScreen('screen-main'); alert("Wiped."); } };
        document.getElementById("btnBackToMain").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnRetry").onclick = () => { lives = 5; score = 0; loadLevel(currentLevel); };
        document.getElementById("btnNextLevel").onclick = () => { loadLevel(currentLevel); };
        document.getElementById("btnPlayAgain").onclick = () => { currentLevel=0; lives=5; score=0; loadLevel(0); };
        document.getElementById("btnQuit1").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnQuit2").onclick = () => { showScreen('screen-main'); };
        document.getElementById("btnPauseMenu").onclick = () => { gameState = "MENU"; showScreen('screen-main'); };
        document.querySelectorAll(".level-btn").forEach(btn => {
            btn.onclick = (e) => {
                let lvl = parseInt(e.target.getAttribute("data-level"));
                if (lvl > unlockedLevel) return;
                currentLevel = lvl; lives = 5; score = 0; saveProgress(); loadLevel(currentLevel);
            };
        });

        function createParticles(x, y, color, count) { for (let i = 0; i < count; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, life: 1.0, color: color, size: Math.random() * 4 + 2 }); } }

        function loadLevel(index) {
            let data = levelData[index];
            player = { x: 50, y: 250, width: 22, height: 42, dx: 0, dy: 0, speed: 6, jumpPower: -11.5, gravity: 0.6, grounded: false, jumps: 0, maxJumps: 2, facing: 1, dashTimer: 0, dashCooldown: 0, touchingWall: 0 };
            cameraX = 0; cameraY = 0; frameCount = 0; particles = []; projectiles = [];
            pagoda = { ...data.pagoda }; 
            clouds = JSON.parse(JSON.stringify(data.clouds)); clouds.forEach(c => { if(c.type === "crumble") c.steppedOn = false; });
            coins = JSON.parse(JSON.stringify(data.coins)).map(c => ({...c, r: 10, collected: false}));
            gems = JSON.parse(JSON.stringify(data.gems || [])).map(g => ({...g, collected: false}));
            enemies = JSON.parse(JSON.stringify(data.enemies));
            gameState = "PLAYING"; startGameUI();
        }

        function die() {
            lives--; playSound('die'); createParticles(player.x + 11, player.y + 21, "#ef4444", 30);
            if (lives > 0) { loadLevel(currentLevel); } else { gameState = "GAMEOVER"; showScreen('screen-gameover'); }
        }

        function update() {
            if (gameState !== "PLAYING") return;
            frameCount++;

            if (player.dashCooldown > 0) player.dashCooldown--;

            // Move Logic
            if (player.dashTimer > 0) {
                player.dashTimer--; player.dy = 0; player.x += player.facing * 15; 
                createParticles(player.x + 10, player.y + 20, "#60a5fa", 1); 
            } else {
                if (keys.right) { player.x += player.speed; walkTimer++; player.facing = 1; }
                else if (keys.left) { player.x -= player.speed; walkTimer++; player.facing = -1; }
                else { walkTimer = 0; }
            }

            if (player.y > cameraY + canvas.height + 150) die(); 

            // COLLISION
            player.grounded = false;
            player.touchingWall = 0; 

            for (let i = clouds.length - 1; i >= 0; i--) {
                let c = clouds[i];
                if (c.type === "moving") { c.x += c.speed; if (c.x > c.maxX || c.x < c.minX) c.speed *= -1; }
                if (c.type === "crumble" && c.steppedOn) {
                    c.timer--; if (c.timer <= 0) { createParticles(c.x + c.w/2, c.y, "#94a3b8", 20); clouds.splice(i, 1); continue; }
                }

                // TOP COLLISION 
                if (player.dy >= 0 && player.y + player.height - player.dy <= c.y && player.y + player.height >= c.y && player.x + player.width > c.x && player.x < c.x + c.w) {
                    if (c.type === "bounce") {
                        player.dy = player.jumpPower * 1.6; player.jumps = 0; playSound('bounce');
                        createParticles(player.x + 10, c.y, "#4ade80", 15);
                    } else {
                        player.grounded = true; player.jumps = 0; player.dy = 0; player.y = c.y - player.height;
                        if (c.type === "moving") player.x += c.speed; 
                        if (c.type === "crumble") c.steppedOn = true; 
                    }
                }
                // SIDE COLLISION
                else if (player.dashTimer === 0 && player.y + player.height > c.y + 10 && player.y < c.y + c.h - 10) {
                    if (player.x + player.width >= c.x && player.x + player.width <= c.x + 12 && keys.right) {
                        player.x = c.x - player.width; player.touchingWall = 1;
                    }
                    else if (player.x <= c.x + c.w && player.x >= c.x + c.w - 12 && keys.left) {
                        player.x = c.x + c.w; player.touchingWall = -1;
                    }
                }
            }

            // Apply Y Physics
            if (player.dashTimer === 0) {
                if (player.touchingWall !== 0 && player.dy > 0) {
                    player.dy *= 0.7; // WALL SLIDE
                    if (frameCount % 5 === 0) createParticles(player.x + (player.touchingWall===1?player.width:0), player.y + 30, "#e2e8f0", 1);
                } else {
                    player.dy += player.gravity; 
                }
                player.y += player.dy;
            }

            // Enemies 
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.type === "patrol") { e.x += e.speed; if (e.x > e.maxX || e.x < e.minX) e.speed *= -1; }
                else if (e.type === "shooter") { e.timer++; if (e.timer >= e.cooldown) { e.timer = 0; projectiles.push({ x: e.x, y: e.y + 10, vx: -2.8, w: 10, h: 10 }); } }

                if (player.x < e.x + e.w && player.x + player.width > e.x && player.y < e.y + e.h && player.y + player.height > e.y) {
                    if (player.dy > 0 && player.y + player.height < e.y + 16) { enemies.splice(i, 1); player.dy = -8.5; score += 100; playSound('stomp'); createParticles(e.x + e.w/2, e.y, "#ef4444", 35); }
                    else { die(); }
                }
            }

            for (let p of projectiles) { p.x += p.vx; if (player.x < p.x + p.w && player.x + player.width > p.x && player.y < p.y + p.h && player.y + player.height > p.y) die(); }

            for (let coin of coins) {
                if (!coin.collected && player.x < coin.x + coin.r && player.x + player.width > coin.x - coin.r && player.y < coin.y + coin.r && player.y + player.height > coin.y - coin.r) {
                    coin.collected = true; score += 50; playSound('coin'); createParticles(coin.x, coin.y, "#facc15", 15);
                }
            }

            for (let gem of gems) {
                if (!gem.collected && player.x < gem.x + 15 && player.x + player.width > gem.x - 15 && player.y < gem.y + 15 && player.y + player.height > gem.y - 15) {
                    gem.collected = true; score += 500; playSound('gem'); createParticles(gem.x, gem.y, "#c084fc", 30);
                    if (score > highScore) { highScore = score; localStorage.setItem("ninjaHighScore", highScore); }
                }
            }

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.035; p.size *= 0.96; }); particles = particles.filter(p => p.life > 0);

            if (player.x + player.width > pagoda.x && player.y + player.height > pagoda.y && player.y + player.height < pagoda.y + pagoda.h) {
                gameState = "WON"; playSound('win'); 
                if (currentLevel >= unlockedLevel && currentLevel < levelData.length - 1) unlockedLevel = currentLevel + 1;
                currentLevel++; saveProgress();
                if (currentLevel >= levelData.length) { gameState = "BEATEN"; unlockedLevel = levelData.length - 1; currentLevel = 0; saveProgress(); showScreen('screen-beaten'); }
                else { showScreen('screen-won'); }
            }

            cameraX = player.x - canvas.width * 0.35; 
            let targetCameraY = player.y - canvas.height * 0.6;
            if (player.y < cameraY + canvas.height * 0.4) { cameraY += (targetCameraY - cameraY) * 0.1; }
            else if (player.y > cameraY + canvas.height * 0.8) { cameraY += (targetCameraY - cameraY) * 0.1; }
        }

        // CRISP SOLID CLOUDS
        function drawCrispCloud(ctx, x, y, w, h, type, steppedOn) {
            ctx.save();
            let shake = (type === "crumble" && steppedOn) ? (Math.random() - 0.5) * 5 : 0;
            ctx.translate(x + shake, y);

            let mainColor = "#ffffff"; let shadowColor = "#cbd5e1"; 
            if (type === "moving") { mainColor = "#bae6fd"; shadowColor = "#38bdf8"; } 
            if (type === "crumble") { mainColor = steppedOn ? "#fca5a5" : "#e2e8f0"; shadowColor = steppedOn ? "#ef4444" : "#94a3b8"; }
            if (type === "bounce") { mainColor = "#bbf7d0"; shadowColor = "#4ade80"; } 

            if (type === "crumble" && steppedOn) ctx.globalAlpha = 0.7;

            let br = Math.min(w/4, h/4, 10); 

            // Base platform (Shadow)
            ctx.fillStyle = shadowColor;
            ctx.beginPath(); ctx.roundRect(0, 5, w, h, br); ctx.fill();

            // Base platform (Main)
            ctx.fillStyle = mainColor;
            ctx.beginPath(); ctx.roundRect(0, 0, w, h, br); ctx.fill();

            // Puffs ONLY on thin horizontal clouds, not tall walls
            if (h <= 50) { 
                let puffR = 15; 
                ctx.fillStyle = shadowColor; ctx.beginPath();
                for(let i = 15; i < w - 10; i += 25) { ctx.arc(i, 2, puffR, 0, Math.PI*2); } ctx.fill();
                
                ctx.fillStyle = mainColor; ctx.beginPath();
                for(let i = 15; i < w - 10; i += 25) { ctx.arc(i, -3, puffR, 0, Math.PI*2); } ctx.fill();
            }

            ctx.restore();
        }

        function drawPagoda(ctx, mX, mY, mW, mH) {
            ctx.save(); ctx.translate(mX, mY);
            drawCrispCloud(ctx, mW/2 - 90, mH - 20, 180, 25, "solid", false); 
            let dX = mW / 2; let dY = mH; let SF = 1.9;
            ctx.fillStyle = "#334155"; ctx.fillRect(dX - 50*SF, dY - 10*SF, 100*SF, 10*SF); 
            ctx.fillStyle = "#78350f"; ctx.fillRect(dX - 40*SF, dY - 40*SF, 80*SF, 30*SF);
            ctx.fillStyle = "#fef3c7"; ctx.fillRect(dX - 15*SF, dY - 30*SF, 30*SF, 20*SF); 
            ctx.fillStyle = "#000"; ctx.fillRect(dX - 1*SF, dY - 30*SF, 2*SF, 20*SF); ctx.fillRect(dX - 15*SF, dY - 20*SF, 30*SF, 2*SF); 
            ctx.fillStyle = "#b91c1c"; ctx.beginPath(); ctx.moveTo(dX - 60*SF, dY - 40*SF); ctx.quadraticCurveTo(dX - 40*SF, dY - 58*SF, dX, dY - 58*SF); ctx.quadraticCurveTo(dX + 40*SF, dY - 58*SF, dX + 60*SF, dY - 40*SF); ctx.lineTo(dX + 50*SF, dY - 40*SF); ctx.quadraticCurveTo(dX, dY - 52*SF, dX - 50*SF, dY - 40*SF); ctx.fill();
            ctx.fillStyle = "#78350f"; ctx.fillRect(dX - 30*SF, dY - 75*SF, 60*SF, 25*SF);
            ctx.fillStyle = "#fef3c7"; ctx.fillRect(dX - 10*SF, dY - 70*SF, 20*SF, 15*SF); ctx.fillStyle = "#000"; ctx.fillRect(dX - 1*SF, dY - 70*SF, 2*SF, 15*SF);
            ctx.fillStyle = "#b91c1c"; ctx.beginPath(); ctx.moveTo(dX - 50*SF, dY - 75*SF); ctx.quadraticCurveTo(dX - 25*SF, dY - 105*SF, dX, dY - 105*SF); ctx.quadraticCurveTo(dX + 25*SF, dY - 105*SF, dX + 50*SF, dY - 75*SF); ctx.lineTo(dX + 40*SF, dY - 75*SF); ctx.quadraticCurveTo(dX, dY - 95*SF, dX - 40*SF, dY - 75*SF); ctx.fill();
            ctx.fillStyle = "#facc15"; ctx.fillRect(dX - 2*SF, dY - 125*SF, 4*SF, 20*SF); ctx.beginPath(); ctx.arc(dX, dY - 125*SF, 4*SF, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState !== "PLAYING") return; 

            // Stars
            ctx.save(); ctx.fillStyle = "white";
            for(let i=0; i<80; i++) {
                let sX = (Math.sin(i) * 5000 - cameraX * 0.05) % canvas.width; if(sX < 0) sX += canvas.width;
                let sY = (Math.cos(i) * 5000 - cameraY * 0.05) % canvas.height; if(sY < 0) sY += canvas.height;
                ctx.globalAlpha = Math.random() * 0.5 + 0.2; ctx.beginPath(); ctx.arc(sX, sY, Math.random() * 1.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();

            ctx.save(); ctx.translate(-cameraX, -cameraY); 

            drawPagoda(ctx, pagoda.x, pagoda.y, pagoda.w, pagoda.h);

            for (let c of clouds) { drawCrispCloud(ctx, c.x, c.y, c.w, c.h, c.type, c.steppedOn); }

            for (let coin of coins) {
                if (!coin.collected) {
                    ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#ca8a04"; ctx.beginPath(); ctx.arc(coin.x, coin.y, coin.r - 3, 0, Math.PI * 2); ctx.fill();
                }
            }

            for (let gem of gems) {
                if (!gem.collected) {
                    ctx.save(); ctx.translate(gem.x, gem.y + Math.sin(frameCount * 0.1) * 5); 
                    ctx.fillStyle = "#c084fc"; 
                    ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(10, 0); ctx.lineTo(0, 12); ctx.lineTo(-10, 0); ctx.fill();
                    ctx.fillStyle = "#a855f7"; 
                    ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(6, 0); ctx.lineTo(0, 8); ctx.lineTo(-6, 0); ctx.fill();
                    ctx.restore();
                }
            }

            for (let e of enemies) {
                if (e.type === "patrol") { 
                    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x + 10, e.y + (frameCount % 10 < 5 ? 12 : -6)); ctx.lineTo(e.x + 20, e.y); ctx.stroke();
                    ctx.lineWidth = 3; ctx.strokeStyle = "#ef4444"; ctx.stroke();
                } else if (e.type === "shooter") { 
                    ctx.fillStyle = "#991b1b"; ctx.fillRect(e.x, e.y, e.w, e.h); ctx.fillStyle = "#fed7aa"; ctx.fillRect(e.x - 2, e.y + 5, 10, 6); 
                }
            }

            ctx.fillStyle = "#cbd5e1";
            for (let p of projectiles) { ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2); ctx.rotate(frameCount * 0.6); ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore(); }

            for (let p of particles) { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
            ctx.globalAlpha = 1.0; 

            // Anime Girl 
            ctx.save(); ctx.translate(player.x, player.y);
            let flip = player.facing; if (flip === -1) ctx.translate(player.width, 0); ctx.scale(flip, 1);
            let breath = Math.sin(frameCount * 0.1) * 1; let hairSway = (player.dashTimer>0) ? 15 : Math.sin(frameCount * 0.15) * 2;
            
            if (player.dashTimer > 0) { ctx.shadowColor = "#3b82f6"; ctx.shadowBlur = 10; }

            ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.moveTo(player.width/2 - 5, 5); ctx.quadraticCurveTo(-15 + hairSway, player.height/2, player.width/2 - 10, player.height + 5); ctx.quadraticCurveTo(player.width/2, player.height+10, player.width+10, player.height/2); ctx.closePath(); ctx.fill();
            ctx.fillStyle = "#fee2e2"; ctx.beginPath(); ctx.roundRect(5, 0 + breath, 15, 18, 5); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(10, 8+breath, 3, 0, Math.PI*2); ctx.arc(17, 8+breath, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#1e40af"; ctx.beginPath(); ctx.arc(11, 8+breath, 1.5, 0, Math.PI*2); ctx.arc(18, 8+breath, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.moveTo(4, 1+breath); ctx.lineTo(12, 10+breath); ctx.lineTo(20, 1+breath); ctx.fill();
            ctx.fillStyle = "#b91c1c"; ctx.fillRect(5, 18, 15, 20); ctx.fillRect(-1, 20+breath, 6, 8); ctx.fillRect(20, 20+breath, 6, 8);
            ctx.fillStyle = "#fee2e2"; ctx.fillRect(0, 26+breath, 4, 4); ctx.fillRect(21, 26+breath, 4, 4); 
            ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.moveTo(2, 35); ctx.lineTo(23, 35); ctx.lineTo(26, 45); ctx.lineTo(-1, 45); ctx.closePath(); ctx.fill();
            
            ctx.fillStyle = "#fee2e2"; 
            if (player.touchingWall !== 0 && !player.grounded) {
                ctx.fillRect(6, 42, 6, 8); ctx.fillRect(18, 35, 6, 8); 
            } else {
                let legOffset = (walkTimer % 10 < 5 && player.grounded && (player.dx !==0)) ? 6 : 0; 
                ctx.fillRect(6 - legOffset, 42, 6, 12); ctx.fillRect(14 + legOffset, 42, 6, 12); 
            }
            
            ctx.restore(); ctx.restore(); 

            let uiScale = canvas.width / 800; 
            ctx.fillStyle = "white"; ctx.font = `bold ${26 * uiScale}px 'Impact'`;
            ctx.shadowColor = "black"; ctx.shadowBlur = 0; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
            ctx.fillText("SCORE: " + score, 15 * uiScale, 35 * uiScale);
            
            if (player.dashCooldown > 0) {
                ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(15 * uiScale, 45 * uiScale, 100 * uiScale, 8 * uiScale);
                ctx.fillStyle = "#3b82f6"; ctx.fillRect(15 * uiScale, 45 * uiScale, (100 - (player.dashCooldown / 60) * 100) * uiScale, 8 * uiScale);
            } else {
                ctx.fillStyle = "#3b82f6"; ctx.fillText("💨 DASH READY", 15 * uiScale, 65 * uiScale);
            }

            ctx.fillStyle = "#facc15"; ctx.fillText("LIVES: " + "❤️".repeat(lives), canvas.width - (140 * uiScale), 35 * uiScale); 
            ctx.shadowColor = "transparent"; 
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        updateLevelSelectUI(); showScreen('screen-main'); loop(); 
    </script>
</body>
